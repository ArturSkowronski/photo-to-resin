name: Publikacja strony na GitHub Pages

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # STL-e figurek (~80 MB) blokowały kolejkę deploymentu Pages;
      # strona linkuje je z raw.githubusercontent.com
      - run: rm -f site/figurki/*.stl site/przyklady/*.stl
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # STL-e figurek podnoszą artefakt do ~110 MB, domyślne 10 min nie starcza
          timeout: 1800000
